name: Refresh news feed

on:
  schedule:
    # Every hour. Note: GitHub's scheduler can lag 15–60 min during high load.
    # For a reliable external trigger, use cron-job.org to POST to:
    #   https://api.github.com/repos/Raxorr/ragornot/actions/workflows/news-cron.yml/dispatches
    # with a GitHub PAT that has actions:write scope (no other permissions needed).
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-news:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # GITHUB_TOKEN so the commit push triggers deploy.yml via the push event.
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch fresh news
        run: npm run fetch-news

      - name: Commit and push if news.json changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet public/news.json; then
            echo "news.json unchanged — skipping commit."
          else
            git add public/news.json
            git commit -m "chore: refresh news feed"
            git push
            echo "Pushed updated news.json — deploy.yml triggered via push event."
          fi
