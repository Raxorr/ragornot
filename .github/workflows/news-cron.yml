name: Refresh news feed

on:
  schedule:
    # Every hour — triggers a deploy which fetches fresh news at build time.
    - cron: "0 * * * *"
  workflow_dispatch:

permissions:
  actions: write

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch deploy workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: 'main',
            });
            console.log('Dispatched deploy.yml to fetch fresh news and redeploy.');
